<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LabOS Benchmark Explorer</title>
    <meta
      name="description"
      content="LabOS benchmark GitHub Pages demo with three benchmark parts, 3D experimental assets, and protocol questions."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.168.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Benchmark navigation">
        <div class="brand-block">
          <p class="eyebrow">LabOS</p>
          <h1>Benchmark Explorer</h1>
          <p class="brand-copy">
            The left sidebar only contains the three benchmark parts. The main area
            focuses on the active part, its 3D asset, and its benchmark question.
          </p>
        </div>
        <nav id="section-nav" class="section-nav"></nav>
      </aside>

      <main class="workspace">
        <header class="page-head">
          <div class="page-copy">
            <p id="section-kicker" class="section-kicker"></p>
            <h2 id="section-title" class="section-title"></h2>
            <p id="section-summary" class="section-summary"></p>
          </div>
          <div id="sample-tabs" class="sample-tabs" aria-label="Sample questions"></div>
        </header>

        <section class="main-grid">
          <section class="viewer-panel">
            <div class="panel-head viewer-head">
              <div>
                <p class="panel-label">3D Asset</p>
                <h3 id="model-label"></h3>
              </div>
              <button id="reset-view" class="ghost-button" type="button">Reset View</button>
            </div>

            <div class="viewer-shell">
              <div id="viewer" class="viewer"></div>
              <div id="viewer-status" class="viewer-status">Loading 3D asset...</div>
            </div>

            <div class="viewer-foot">
              <p id="viewer-description" class="viewer-description"></p>
              <div id="viewer-tags" class="viewer-tags"></div>
            </div>
          </section>

          <section class="detail-panel">
            <div class="panel-head">
              <p id="item-kind" class="panel-label"></p>
              <h3 id="item-title"></h3>
            </div>
            <div id="item-body" class="item-body"></div>
          </section>
        </section>

        <section id="media-panel" class="media-panel" hidden>
          <div class="panel-head">
            <p class="panel-label">Supplement</p>
            <h3 id="media-title">Supplementary Media</h3>
          </div>
          <div class="media-grid">
            <img id="media-image" class="media-image" alt="" hidden />
            <video id="media-video" class="media-video" controls muted loop playsinline hidden></video>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
